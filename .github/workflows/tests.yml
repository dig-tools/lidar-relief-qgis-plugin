name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # Minimal installation check: deliberately runs before installing any of the
  # plugin's optional Python packages. This protects the contract that QGIS can
  # load the complete provider even when specialized tools are unavailable.
  minimal-runtime-smoke:
    runs-on: ubuntu-latest
    container: qgis/qgis:final-3_34_2
    steps:
      - uses: actions/checkout@v4

      - name: Load plugin and execute a core algorithm without optional packages
        env:
          PYTHONPATH: /usr/share/qgis/python:/usr/share/qgis/python/plugins:.
          QT_QPA_PLATFORM: offscreen
          LD_LIBRARY_PATH: /usr/lib
        run: python3 scripts/qgis_smoke_test.py

  # ─────────────────────────────────────────────────────────────────────
  # Core tests — pure NumPy, no GDAL/QGIS required.
  # These run on every push and cover the relief visualisation algorithms
  # (hillshade, SVF, ASVF, openness, SLRM, MSTP, slope, blend, etc.).
  # ─────────────────────────────────────────────────────────────────────
  core-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pytest

      - name: Install rvt-py for golden regression tests
        # rvt-py requires GDAL which isn't easy to install via pip on
        # Ubuntu. We install just the pure-Python visualization module
        # by extracting it from the wheel (the same trick used in dev).
        # If this fails, the golden tests skip cleanly via
        # pytest.importorskip("rvt").
        run: |
          pip download rvt-py --no-deps -d /tmp/rvt-download || true
          if [ -f /tmp/rvt-download/rvt_py-*.whl ]; then
            unzip -q /tmp/rvt-download/rvt_py-*.whl -d /tmp/rvt-extracted
            SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
            cp -r /tmp/rvt-extracted/rvt "$SITE_PACKAGES"/
            echo "rvt-py installed (pure-Python only)"
          else
            echo "rvt-py download failed — golden tests will skip"
          fi

      - name: Run core tests (no GDAL required)
        env:
          PYTHONPATH: .
        run: |
          python -m pytest lidar_relief/tests/ \
            --ignore=lidar_relief/tests/test_csf_filter.py \
            --ignore=lidar_relief/tests/test_pdal_pipeline.py \
            --ignore=lidar_relief/tests/test_temporal.py \
            --ignore=lidar_relief/tests/test_fusion.py \
            --ignore=lidar_relief/tests/test_ml_detector.py \
            --ignore=lidar_relief/tests/test_gpu.py \
            --ignore=lidar_relief/tests/test_cog_export.py \
            --ignore=lidar_relief/tests/test_web_viewer.py \
            --ignore=lidar_relief/tests/test_field_export.py \
            --ignore=lidar_relief/tests/test_report_generator.py \
            --tb=short -v

  # ─────────────────────────────────────────────────────────────────────
  # Full test suite — includes GDAL-dependent tests.
  # Uses the official qgis/qgis Docker image which has GDAL + QGIS
  # Python bindings pre-installed. The container only ships `python3`
  # (no `python` alias) and uses `sh` (no bash), so we use `python3`
  # everywhere and avoid bash-specific syntax.
  # ─────────────────────────────────────────────────────────────────────
  full-tests:
    runs-on: ubuntu-latest
    container: qgis/qgis:final-3_34_2
    steps:
      - uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          set -e
          # qgis/qgis container has Python 3 with QGIS bindings + GDAL.
          # Use python3 explicitly — the container has no `python` alias.
          #
          # The container's pre-built scipy, rasterio, rio-cogeo,
          # reportlab, and rioxarray wheels were compiled against
          # numpy 1.x and crash under numpy 2.x. We pin numpy==1.26.4
          # (the last 1.x release, compatible with all the packages we
          # need) by installing everything in ONE pip command — pip's
          # resolver will then keep numpy at 1.26.4 because all packages
          # accept numpy>=1.21.6 (which 1.26.4 satisfies) and we're
          # explicitly requesting numpy==1.26.4.
          python3 -m pip install --upgrade pip
          python3 -m pip install \
            "numpy==1.26.4" \
            scipy pytest \
            cloth-simulation-filter \
            rasterio rioxarray xarray reportlab laspy \
            rio-cogeo \
            onnxruntime onnx
          # Verify numpy stayed at 1.x — if a package upgraded it, fail
          # the job early with a clear message rather than failing later
          # with a confusing "numpy.dtype size changed" error.
          python3 -c "import numpy; assert numpy.__version__.startswith('1.'), f'numpy was upgraded to {numpy.__version__} — will break scipy'"
          python3 -c "import CSF; print('cloth-simulation-filter import OK')"

      - name: Install rvt-py (pure-Python module)
        run: |
          # rvt-py imports scipy.ndimage, which works with numpy 1.26.4.
          python3 -m pip download rvt-py --no-deps -d /tmp/rvt-download || true
          if [ -f /tmp/rvt-download/rvt_py-*.whl ]; then
            unzip -q /tmp/rvt-download/rvt_py-*.whl -d /tmp/rvt-extracted
            SITE_PACKAGES=$(python3 -c "import site; print(site.getsitepackages()[0])")
            cp -r /tmp/rvt-extracted/rvt "$SITE_PACKAGES"/
          fi

      - name: CSF filter determinism (3x cold runs)
        # Belt-and-suspenders against the cloth-simulation-filter OpenMP
        # floating-point non-determinism flake in
        # tests/test_csf_filter.py::TestCSFFilter::test_filter_deterministic.
        # csf_filter.py sets OMP_NUM_THREADS=1 when imported under pytest,
        # restoring bit-stable FP accumulation by forcing libgomp into a
        # single-threaded schedule. This step re-runs the determinism
        # test 3 times in fresh Python processes to surface any future
        # regression in that isolation (e.g. someone lifting the
        # pytest-only OMP_NUM_THREADS guard into production, swapping the
        # CSF wheel for one that ignores OMP_NUM_THREADS, or moving CSF
        # to a thread-pool backend). Each invocation loads a brand-new
        # Python process so the OpenMP FP accumulator starts cold.
        run: |
          for i in 1 2 3; do
            echo "=== determinism check attempt $i ==="
            if ! python3 -m pytest lidar_relief/tests/test_csf_filter.py::TestCSFFilter::test_filter_deterministic --tb=short; then
              echo "::error ::test_filter_deterministic failed on attempt $i (likely OpenMP FP non-determinism regressed in csf_filter.py or a CSF upgrade)."
              exit 1
            fi
          done
          echo "✓ test_filter_deterministic passed 3/3 cold runs"

      - name: Run full test suite
        env:
          PYTHONPATH: /usr/share/qgis/python:.
          LD_LIBRARY_PATH: /usr/lib
        run: |
          # The CSF determinism test is run 3x in the previous step as a
          # permanent regression guard; --deselect avoids running it a 4th
          # time here so the only execution path is the dedicated guard.
          python3 -m pytest lidar_relief/tests/ --tb=short -v \
            --deselect lidar_relief/tests/test_csf_filter.py::TestCSFFilter::test_filter_deterministic

      - name: QGIS plugin runtime smoke test
        env:
          PYTHONPATH: /usr/share/qgis/python:/usr/share/qgis/python/plugins:.
          QT_QPA_PLATFORM: offscreen
          LD_LIBRARY_PATH: /usr/lib
        run: python3 scripts/qgis_smoke_test.py
