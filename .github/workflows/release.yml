name: Release QGIS Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Force an explicit, full-history checkout of the tag that triggered
          # this workflow. Without this, on tag pushes actions/checkout leaves
          # HEAD as a shallow (fetch-depth: 1) commit which can produce stale
          # archives inside `qgis-plugin-ci release` (it internally does
          # `git archive HEAD`, which on shallow clones has produced zips with
          # content from an unrelated commit). Fetching full history makes the
          # ci pipeline deterministic.
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest numpy scipy
          pip install rio-cogeo reportlab xarray rioxarray onnxruntime onnx 2>/dev/null || true
          pip install cloth-simulation-filter 2>/dev/null || true
          pip install rvt-py 2>/dev/null || true

      - name: Run Tests and Linter
        run: ./test.sh

      - name: Verify tree clean before package
        run: |
          echo "::notice title=Tree state::ref=${{ github.ref_name }} sha=$(git rev-parse HEAD)"
          # Track-only check (git diff HEAD), not `git status --porcelain`,
          # because `./test.sh` may leave untracked artifacts (__pycache__/,
          # .pytest_cache/, etc.) that `git archive HEAD` does NOT include
          # in the published zip — only changes to tracked files can pollute
          # the artifact.
          if ! git diff --quiet HEAD ; then
            echo "::error::Tracked working tree has changes vs HEAD after test.sh. Refusing to publish a possibly-stale zip."
            git diff --stat HEAD
            exit 1
          fi

      - name: Install qgis-plugin-ci
        run: pip install qgis-plugin-ci

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists; qgis-plugin-ci will refresh assets in step 7."
          else
            echo "Creating release v${VERSION}."
            gh release create "v${VERSION}" \
              --title "Release v${VERSION}" \
              --generate-notes
          fi

      - name: Package and Release to GitHub and QGIS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Extracts the version number from the tag (e.g. v1.1.0 -> 1.1.0)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if [ -n "${{ secrets.QGIS_TOKEN }}" ]; then
            echo "Publishing to QGIS using QGIS_TOKEN..."
            qgis-plugin-ci release ${VERSION} \
              --release-tag v${VERSION} \
              --github-token ${GITHUB_TOKEN} \
              --qgis-token ${{ secrets.QGIS_TOKEN }} \
              --create-plugin-repo \
              -c
          elif [ -n "${{ secrets.OSGEO_USERNAME }}" ]; then
            echo "Publishing to QGIS using OSGEO credentials..."
            qgis-plugin-ci release ${VERSION} \
              --release-tag v${VERSION} \
              --github-token ${GITHUB_TOKEN} \
              --osgeo-username ${{ secrets.OSGEO_USERNAME }} \
              --osgeo-password ${{ secrets.OSGEO_PASSWORD }} \
              --create-plugin-repo \
              -c
          else
            echo "QGIS credentials not found. Releasing only to GitHub."
            qgis-plugin-ci release ${VERSION} \
              --release-tag v${VERSION} \
              --github-token ${GITHUB_TOKEN} \
              --create-plugin-repo \
              -c
          fi
