name: Release QGIS Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Force an explicit, full-history checkout of the tag that triggered
          # this workflow. Without this, on tag pushes actions/checkout leaves
          # HEAD as a shallow (fetch-depth: 1) commit which can produce stale
          # archives inside `qgis-plugin-ci release` (it internally does
          # `git archive HEAD`, which on shallow clones has produced zips with
          # content from an unrelated commit). Fetching full history makes the
          # ci pipeline deterministic.
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest numpy scipy flake8 bandit
          pip install rio-cogeo reportlab xarray rioxarray onnxruntime onnx 2>/dev/null || true
          pip install cloth-simulation-filter 2>/dev/null || true
          pip install rvt-py 2>/dev/null || true

      - name: Run Tests and Linter
        run: ./test.sh

      - name: Run security and QGIS 4 compatibility guards
        run: |
          bandit -r lidar_relief -x lidar_relief/tests
          if grep -R -n -E 'QgsRasterBandStats\.All|QgsContrastEnhancement\.StretchToMinimumMaximum|QgsProcessingParameterNumber\.(Double|Integer)|QgsProcessingParameterField\.(Any|Numeric)|QgsProcessing\.TypeRaster' lidar_relief --include='*.py'; then
            echo "::error::Deprecated unscoped QGIS enums remain in plugin code."
            exit 1
          fi

      - name: Verify tree clean before package
        run: |
          echo "::notice title=Tree state::ref=${{ github.ref_name }} sha=$(git rev-parse HEAD)"
          # Track-only check (git diff HEAD), not `git status --porcelain`,
          # because `./test.sh` may leave untracked artifacts (__pycache__/,
          # .pytest_cache/, etc.) that `git archive HEAD` does NOT include
          # in the published zip — only changes to tracked files can pollute
          # the artifact.
          if ! git diff --quiet HEAD ; then
            echo "::error::Tracked working tree has changes vs HEAD after test.sh. Refusing to publish a possibly-stale zip."
            git diff --stat HEAD
            exit 1
          fi

      - name: Verify CHANGELOG.md covers metadata.txt version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          METADATA_VERSION=$(sed -n 's/^version=//p' lidar_relief/metadata.txt)
          if [ "${VERSION}" != "${METADATA_VERSION}" ]; then
            echo "::error::Tag v${VERSION} does not match metadata version ${METADATA_VERSION}."
            exit 1
          fi
          echo "::notice title=Changelog guard::checking CHANGELOG.md has ## [${VERSION}]"
          # Prevents an accidental release that would publish a zip with no
          # narrative behind the auto-generated "Full Changelog" shortlog on
          # the GitHub Release page (see scripts/check_changelog.py for the
          # rule set and failure-message format).  Hard fail so the publish
          # step below never runs with a guard-broken changelog.
          python3 scripts/check_changelog.py --quiet

      - name: Install qgis-plugin-ci
        run: pip install qgis-plugin-ci

      - name: Verify qgis-plugin-ci can parse release notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          python3 -c "from qgispluginci.changelog import ChangelogParser; text = ChangelogParser().content('${VERSION}'); assert text and len(text.strip()) > 40, 'qgis-plugin-ci parsed empty release notes'"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          awk -v version="${VERSION}" '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            capture && /^---$/ { exit }
            capture { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "::error::No release notes found for ${VERSION} in CHANGELOG.md."
            exit 1
          fi
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Updating release v${VERSION} notes from CHANGELOG.md."
            gh release edit "v${VERSION}" --notes-file /tmp/release-notes.md
          else
            echo "Creating release v${VERSION}."
            gh release create "v${VERSION}" \
              --title "Release v${VERSION}" \
              --notes-file /tmp/release-notes.md
          fi

      - name: Package and Release to GitHub and QGIS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Extracts the version number from the tag (e.g. v1.1.0 -> 1.1.0)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if [ -n "${{ secrets.QGIS_TOKEN }}" ]; then
            echo "Publishing to QGIS using QGIS_TOKEN..."
            qgis-plugin-ci release ${VERSION} \
              --release-tag v${VERSION} \
              --github-token ${GITHUB_TOKEN} \
              --qgis-token ${{ secrets.QGIS_TOKEN }} \
              --create-plugin-repo \
              -c
          elif [ -n "${{ secrets.OSGEO_USERNAME }}" ]; then
            echo "Publishing to QGIS using OSGEO credentials..."
            qgis-plugin-ci release ${VERSION} \
              --release-tag v${VERSION} \
              --github-token ${GITHUB_TOKEN} \
              --osgeo-username ${{ secrets.OSGEO_USERNAME }} \
              --osgeo-password ${{ secrets.OSGEO_PASSWORD }} \
              --create-plugin-repo \
              -c
          else
            echo "QGIS credentials not found. Releasing only to GitHub."
            qgis-plugin-ci release ${VERSION} \
              --release-tag v${VERSION} \
              --github-token ${GITHUB_TOKEN} \
              --create-plugin-repo \
              -c
          fi
