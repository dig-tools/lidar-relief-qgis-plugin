name: Release QGIS Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest numpy

      - name: Run Tests and Linter
        run: ./test.sh

      - name: Install qgis-plugin-ci
        run: pip install qgis-plugin-ci

      - name: Package and Release to GitHub and QGIS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Extracts the version number from the tag (e.g. v1.1.0 -> 1.1.0)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          qgis-plugin-ci release ${VERSION} \
            --github-token ${GITHUB_TOKEN} \
            --osgeo-username ${{ secrets.OSGEO_USERNAME }} \
            --osgeo-password ${{ secrets.OSGEO_PASSWORD }} \
            --create-plugin-repo
