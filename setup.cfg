[flake8]
extend-ignore = W503,E203
max-line-length = 120
exclude =
    .git,
    __pycache__,
    _archive,
    .ruff_cache,
    .pytest_cache,
    *.egg-info
# Test files legitimately need E402 (module-level import after
# pytest.importorskip) — that pattern is the recommended way to skip
# tests on missing optional dependencies.
per-file-ignores =
    lidar_relief/tests/*.py:E402

[coverage:run]
source = lidar_relief
omit =
    lidar_relief/tests/*
    lidar_relief/_archive/*
branch = True

[coverage:report]
# Fail CI if total coverage drops below this threshold.
fail_under = 40
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:

[tool:pytest]
testpaths = lidar_relief/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Strict markers: typo'd `pytest.mark.foobar` will raise an error.
addopts = --strict-markers --tb=short
# Treat DeprecationWarnings as errors to catch uses of deprecated APIs
# early — EXCEPT for warnings originating from third-party libraries
# (rvt-py, scipy) that we can't fix. Those are filtered out here.
filterwarnings =
    error::DeprecationWarning
    # rvt-py 2.2.1 imports distance_transform_edt from the deprecated
    # scipy.ndimage.morphology namespace. This is rvt-py's bug, not ours.
    # The warning message varies between scipy versions ("Please import"
    # vs "Please use", different punctuation), so we match on the stable
    # substring "scipy.ndimage.morphology".
    ignore:.*scipy\.ndimage\.morphology.*:DeprecationWarning
    # scipy in the QGIS Docker container uses numpy.core.multiarray
    # (deprecated in numpy 2.x). This is scipy's bug, not ours.
    ignore:.*numpy\.core\.multiarray.*:DeprecationWarning
    # Older scipy versions emit this warning when imported under numpy 2.x.
    ignore:.*numpy\.core\..*deprecated.*:DeprecationWarning
